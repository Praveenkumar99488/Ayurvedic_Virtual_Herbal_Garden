<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Himalayan Cedar Interaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #d0ece1, #a0d5c9); /* Gentle mint to teal gradient */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrapper {
      display: flex;
      gap: 30px;
      max-width: 1100px;
      width: 100%;
      margin: auto;
      align-items: flex-start;
    }
    .model-container {
      position: relative;
      width: 100vw;
      height: 95vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .model-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
    }
    .overlay {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      z-index:20;
      cursor:pointer;
    }
    .hotspot {
      position: absolute;
      width:20px; height:20px;
      background: radial-gradient(circle, #76c7b7 0%, #359d8b 100%); /* Cool forest tones */
      border-radius:50%;
      border:2px solid white;
      cursor:pointer;
      animation: pulse 2s infinite;
      z-index:10;
    }
    .hotspot:hover { transform: scale(1.3); }
    @keyframes pulse {
      0% { box-shadow:0 0 0 0 rgba(118,199,183,0.7); }
      70% { box-shadow:0 0 0 12px rgba(118,199,183,0); }
      100% { box-shadow:0 0 0 0 rgba(118,199,183,0); }
    }
    .info-box {
      flex:1;
      background:rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      padding:30px;
      border-radius:20px;
      color:#2d2d2d;
      box-shadow:0 8px 25px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      display:none;
    }
    .info-box.active { display: block; }
    .info-title {
      font-size:22px; font-weight:600;
      margin-bottom:15px;
      color:#359d8b;
    }
    .info-text {
      font-size:15px; line-height:1.7;
    }
    .note {
      font-size:14px; color:#555;
      margin-top:10px; font-style:italic;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="model-container">
      <div class="overlay" onclick="hideHotspotsAndOverlay()"></div>
      <iframe
        title="Himalayan Cedar 3D"
        src="https://sketchfab.com/models/b1c2e633aff6409685f64802f4667b2d/embed?autostart=1"
        allow="autoplay; fullscreen; xr-spatial-tracking"
        xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share>
      </iframe>
      <!-- Hotspots -->
      <div class="hotspot" style="top: 20%; left: 50%;" onclick="showInfo('leaf')" title="Leaves (Needles)"></div>
      <div class="hotspot" style="top: 45%; left: 55%;" onclick="showInfo('cone')" title="Cones"></div>
      <div class="hotspot" style="top: 70%; left: 50%;" onclick="showInfo('bark')" title="Bark"></div>
      <div class="hotspot" style="top: 85%; left: 45%;" onclick="showInfo('wood')" title="Wood / Essential Oil"></div>
    </div>

    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">Click a part</div>
      <div class="info-text" id="infoText">Click a marker on the Himalayan Cedar tree to explore its parts.</div>
      <div class="note">📌 Hotspots disappear on first click, giving you full 3D control.</div>
    </div>
  </div>

  <script>
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const infoBox = document.getElementById("infoBox");
    const infoContent = {
      leaf: {
        title: "🌿 Cedar Needles",
        text: "Needles are aromatic and contain essential oils with antimicrobial and insect-repellent properties."},
      cone: {
        title: "🌲 Cedar Cones",
        text: "Barrel-shaped cones that develop on branches; they release seeds for reproduction and are typical of cedar morphology."},
      bark: {
        title: "🪵 Cedar Bark",
        text: "Bark is astringent and traditionally used in Ayurvedic decoctions to treat fevers, respiratory conditions, and skin issues."},
      wood: {
        title: "🏗️ Cedar Wood & Oil",
        text: "Durable, rot-resistant wood prized in construction and furniture. Its essential oil is valued for fragrance, antiseptic, and anti-inflammatory uses."}
    };
    function showInfo(part) {
      infoTitle.textContent = infoContent[part].title;
      infoText.textContent = infoContent[part].text;
      infoBox.classList.add("active");
    }
    function hideHotspotsAndOverlay() {
      document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'none');
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>
</body>
</html>
