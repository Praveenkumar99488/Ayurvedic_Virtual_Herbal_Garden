<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Rhododendron – Azalea Interaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #b3e5fc, #e1bee7); /* Soft blue to lavender */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrapper {
      display: flex;
      gap: 30px;
      max-width: 1100px;
      margin: auto;
      align-items: flex-start;
    }
    .model-container {
      position: relative;
      width: 100vw;
      height: 95vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }
    .model-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      cursor: pointer;
    }
    .hotspot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #ff8a65 0%, #d84315 100%);
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      animation: pulse 2s infinite;
      z-index: 10;
    }
    .hotspot:hover {
      transform: scale(1.3);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 138, 101, 0.7); }
      70% { box-shadow: 0 0 0 12px rgba(255, 138, 101, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 138, 101, 0); }
    }
    .info-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      color: #2d2d2d;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      display: none;
    }
    .info-box.active {
      display: block;
    }
    .info-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #5d4037;
    }
    .info-text {
      font-size: 15px;
      line-height: 1.7;
    }
    .note {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="model-container">
      <div class="overlay" onclick="hideHotspotsAndOverlay()"></div>
      <iframe title="Rhododendron Azalea 3D"
              src="https://sketchfab.com/models/793a75d1dabd42228a112454ec18aaac/embed?autostart=1"
              allow="autoplay; fullscreen; xr-spatial-tracking"
              xr-spatial-tracking
              execution-while-out-of-viewport
              execution-while-not-rendered
              web-share></iframe>
      <!-- Hotspots (positions are illustrative; tweak as needed) -->
      <div class="hotspot" style="top: 45%; left: 55%;" onclick="showInfo('flower')" title="Flower"></div>
      <div class="hotspot" style="top: 70%; left: 50%;" onclick="showInfo('leaf')" title="Leaf"></div>
      <div class="hotspot" style="top: 90%; left: 45%;" onclick="showInfo('stem')" title="Stem"></div>
    </div>

    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">Click a part</div>
      <div class="info-text" id="infoText">Click a red marker on the Rhododendron to view detailed information.</div>
      <div class="note">📌 Click ▶️ play to animate the model. Hotspots disappear once the model starts.</div>
    </div>
  </div>

  <script>
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const infoBox   = document.getElementById("infoBox");

    const infoContent = {
      flower: {
        title: "🌸 Rhododendron Flower",
        text: "The vibrant petals of the Azalea flower are rich in anthocyanins and are known for their beauty. In gardens, they symbolize elegance and passion."
      },
      leaf: {
        title: "🍃 Rhododendron Leaf",
        text: "The lush green leaves help absorb sunlight and support photosynthesis. They contribute to the plant’s overall health and structure."
      },
      stem: {
        title: "🌿 Rhododendron Stem",
        text: "The strong stem provides structural support and transports nutrients and water throughout the plant."
      }
    };

    function showInfo(part) {
      infoTitle.textContent = infoContent[part].title;
      infoText.textContent  = infoContent[part].text;
      infoBox.classList.add("active");
    }

    function hideHotspotsAndOverlay() {
      document.querySelectorAll('.hotspot').forEach(dot => dot.style.display = 'none');
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>
</body>
</html>
