<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Turmeric Interaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(to right, #f6d365, #fda085); /* Warm yellow to orange */
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
    }

    .model-container {
        position: relative;
        width: 90vw;
        height: 85vh;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
    }

    .model-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 20px;
    }

    .wrapper {
        display: flex;
        gap: 30px;
        max-width: 1100px;
        margin: auto;
        align-items: flex-start;
    }

    .model-container {
        position: relative;
        width: 100vw;
        height: 95vh;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 20;
        cursor: pointer;
    }

    .hotspot {
        position: absolute;
        width: 20px;
        height: 20px;
        background: radial-gradient(circle, #ff6f61 0%, #d64541 100%);
        border-radius: 50%;
        border: 2px solid white;
        cursor: pointer;
        animation: pulse 2s infinite;
        z-index: 10;
    }

    .hotspot:hover {
        transform: scale(1.3);
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 111, 97, 0.7); }
        70% { box-shadow: 0 0 0 12px rgba(255, 111, 97, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 111, 97, 0); }
    }

    .info-box {
        flex: 1;
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        padding: 30px;
        border-radius: 20px;
        color: #2d2d2d;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
        display: none;
    }

    .info-box.active {
        display: block;
    }

    .info-title {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 15px;
        color: #b45f04; /* Turmeric brown */
    }

    .info-text {
        font-size: 15px;
        line-height: 1.7;
    }

    .note {
        font-size: 14px;
        color: #555;
        margin-top: 10px;
        font-style: italic;
    }
</style>

</head>
<body>

  <div class="wrapper">
    <div class="model-container">
      <div class="overlay" onclick="hideHotspotsAndOverlay()"></div>

      <iframe 
        title="Turmeric 3D" 
        src="https://sketchfab.com/models/05f6febc74134387901d7bb5aa8d2ffb/embed?autostart=1"
        allow="autoplay; fullscreen; xr-spatial-tracking" 
        xr-spatial-tracking 
        execution-while-out-of-viewport 
        execution-while-not-rendered 
        web-share>
      </iframe>

      <!-- Hotspots -->
      <div class="hotspot" style="top: 35%; left: 55%;" onclick="showInfo('leaf')" title="Leaf"></div>
      <div class="hotspot" style="top: 60%; left: 50%;" onclick="showInfo('stem')" title="Stem"></div>
      <div class="hotspot" style="top: 80%; left: 45%;" onclick="showInfo('rhizome')" title="Rhizome"></div>
    </div>

    <!-- Info Box -->
    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">Click a part</div>
      <div class="info-text" id="infoText">Click a red marker on the Turmeric plant to view detailed information.</div>
      <div class="note">📌 Hotspots disappear after first click so you can explore freely.</div>
    </div>
  </div>

  <script>
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const infoBox = document.getElementById("infoBox");

    const infoContent = {
      leaf: {
        title: "🍃 Turmeric Leaf",
        text: "Broad, bright green leaves used in traditional cooking for flavoring and wrapping food. They also have mild medicinal benefits."
      },
      stem: {
        title: "🌱 Turmeric Stem",
        text: "The stem supports the leaves and channels nutrients down to the rhizome where active compounds are stored."
      },
      rhizome: {
        title: "🌿 Turmeric Rhizome",
        text: "The underground root-like structure rich in curcumin, known for anti-inflammatory, antioxidant, and medicinal properties."
      }
    };

    function showInfo(part) {
      infoTitle.textContent = infoContent[part].title;
      infoText.textContent = infoContent[part].text;
      infoBox.classList.add("active");
    }

    function hideHotspotsAndOverlay() {
      document.querySelectorAll('.hotspot').forEach(dot => dot.style.display = 'none');
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>

</body>
</html>
