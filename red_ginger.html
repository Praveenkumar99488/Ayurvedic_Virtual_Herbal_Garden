<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Red Ginger Interaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #ff5f6d, #ffc371); /* Warm coral to soft yellow */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      display: flex;
      gap: 30px;
      max-width: 1100px;
      width: 100%;
      margin: auto;
      align-items: flex-start;
    }

    .model-container {
      position: relative;
      width: 100vw;
      height: 95vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .model-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      cursor: pointer;
    }

    .hotspot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #ff7f50 0%, #ff6347 100%); /* Coral orange tones */
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      animation: pulse 2s infinite;
      z-index: 10;
    }

    .hotspot:hover {
      transform: scale(1.3);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(255, 127, 80, 0.7); }
      70% { box-shadow: 0 0 0 12px rgba(255, 127, 80, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 127, 80, 0); }
    }

    .info-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      color: #2d2d2d;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      display: none;
    }

    .info-box.active {
      display: block;
    }

    .info-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #d1495b; /* Deep red-ginger tone */
    }

    .info-text {
      font-size: 15px;
      line-height: 1.7;
    }

    .note {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="model-container">
      <div class="overlay" onclick="hideHotspots()"></div>

      <iframe
        title="Red Ginger 3D"
        src="https://sketchfab.com/models/2023c79497fb4f5f9d2373208a1e77bf/embed?autostart=1"
        allow="autoplay; fullscreen; xr-spatial-tracking"
        xr-spatial-tracking
        execution-while-out-of-viewport
        execution-while-not-rendered
        web-share>
      </iframe>

      <!-- Hotspots -->
      <div class="hotspot" style="top: 25%; left: 50%;" onclick="showInfo('leaf')" title="Leaf"></div>
      <div class="hotspot" style="top: 50%; left: 45%;" onclick="showInfo('stem')" title="Stem"></div>
      <div class="hotspot" style="top: 75%; left: 40%;" onclick="showInfo('inflorescence')" title="Inflorescence"></div>
    </div>

    <!-- Info Box -->
    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">Click a part</div>
      <div class="info-text" id="infoText">Click a red marker on the model to explore.</div>
      <div class="note">📌 First click removes the hotspots so you can explore the model fully.</div>
    </div>
  </div>

  <script>
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const infoBox = document.getElementById("infoBox");

    const infoContent = {
      leaf: {
        title: "🍃 Red Ginger Leaf",
        text: "Large, elongated leaves that help the plant photosynthesize and provide a lush backdrop to its vibrant inflorescence."
      },
      stem: {
        title: "🌿 Red Ginger Stem",
        text: "Sturdy stem that supports the leaves and flower, serving as a conduit for nutrients from the rhizome."
      },
      inflorescence: {
        title: "🌺 Red Ginger Inflorescence",
        text: "The colorful, cone-like flower structure is prized in ornamental horticulture and symbolises tropical beauty."
      }
    };

    function showInfo(part) {
      infoTitle.textContent = infoContent[part].title;
      infoText.textContent = infoContent[part].text;
      infoBox.classList.add("active");
    }

    function hideHotspots() {
      document.querySelectorAll('.hotspot').forEach(dot => dot.style.display = 'none');
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>

</body>
</html>
