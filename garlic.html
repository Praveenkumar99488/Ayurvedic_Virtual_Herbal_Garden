<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Garlic Interaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #fff9e6, #d4e0c3); /* Light saffron to sage gradient */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrapper {
      display: flex;
      gap: 30px;
      max-width: 1100px;
      width: 100%;
      margin: auto;
      align-items: flex-start;
    }
    .model-container {
      position: relative;
      width: 100vw;
      height: 95vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .model-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
    }
    .overlay {
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      z-index:20;
      cursor:pointer;
    }
    .hotspot {
      position: absolute;
      width:20px; height:20px;
      background: radial-gradient(circle, #c4b97a 0%, #8b854f 100%); /* Garlic-brown tones */
      border-radius:50%;
      border:2px solid white;
      cursor:pointer;
      animation: pulse 2s infinite;
      z-index:10;
    }
    .hotspot:hover { transform: scale(1.3); }
    @keyframes pulse {
      0% { box-shadow:0 0 0 0 rgba(196,185,122,0.7); }
      70% { box-shadow:0 0 0 12px rgba(196,185,122,0); }
      100% { box-shadow:0 0 0 0 rgba(196,185,122,0); }
    }
    .info-box {
      flex:1;
      background:rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      padding:30px;
      border-radius:20px;
      color:#2d2d2d;
      box-shadow:0 8px 25px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      display:none;
    }
    .info-box.active { display: block; }
    .info-title {
      font-size:22px; font-weight:600;
      margin-bottom:15px;
      color:#8b854f;
    }
    .info-text {
      font-size:15px; line-height:1.7;
    }
    .note {
      font-size:14px; color:#555;
      margin-top:10px; font-style:italic;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="model-container">
      <div class="overlay" onclick="hideHotspotsAndOverlay()"></div>
      <iframe
        title="Garlic Plant 3D"
        src="https://sketchfab.com/models/c8c0833fd3384876a1e8fa55ed6d32cd/embed?autostart=1"
        allow="autoplay; fullscreen; xr-spatial-tracking"
        xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share>
      </iframe>

      <!-- Hotspots -->
      <div class="hotspot" style="top: 25%; left: 50%;" onclick="showInfo('leaf')" title="Leaf"></div>
      <div class="hotspot" style="top: 50%; left: 45%;" onclick="showInfo('bulb')" title="Bulb / Clove"></div>
      <div class="hotspot" style="top: 75%; left: 50%;" onclick="showInfo('scape')" title="Scape / Flower"></div>
    </div>

    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">Click a part</div>
      <div class="info-text" id="infoText">Click a marker on the garlic plant to explore its parts.</div>
      <div class="note">📌 Hotspots disappear after the first click, allowing full model exploration.</div>
    </div>
  </div>

  <script>
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const infoBox = document.getElementById("infoBox");
    const infoContent = {
      leaf: {
        title: "🍃 Garlic Leaf",
        text: "Flat, linear leaves that perform photosynthesis. These are botanically distinct from hollow onion leaves. The leaves feed the bulb’s growth."},
      bulb: {
        title: "🧄 Garlic Bulb & Clove",
        text: "The most used part—formed of multiple fleshy cloves encased in papery layers. Each clove is essentially a bud surrounded by modified leaves :contentReference[oaicite:0]{index=0}."},
      scape: {
        title: "🌿 Garlic Scape / Flower",
        text: "The flower stalk (scape) appears in hardneck varieties and may bear bulbils—these edible scapes look and taste similar to asparagus :contentReference[oaicite:1]{index=1}."}
    };
    function showInfo(part) {
      infoTitle.textContent = infoContent[part].title;
      infoText.textContent = infoContent[part].text;
      infoBox.classList.add("active");
    }
    function hideHotspotsAndOverlay() {
      document.querySelectorAll('.hotspot').forEach(el => el.style.display = 'none');
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>
</body>
</html>
