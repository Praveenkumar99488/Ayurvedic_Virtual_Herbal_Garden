<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Colorful Ashwagandha Interaction</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #d4e157, #aed581); /* Soft chartreuse to soft green gradient */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      display: flex;
      gap: 30px;
      max-width: 1100px;
      width: 100%;
      margin: auto;
      align-items: flex-start;
    }

    .model-container {
      position: relative;
      width: 100vw;
      height: 95vh;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .model-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 20px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
      cursor: pointer;
    }

    .hotspot {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #8bc34a 0%, #689f38 100%); /* Greenish tones */
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      animation: pulse 2s infinite;
      z-index: 10;
    }

    .hotspot:hover {
      transform: scale(1.3);
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0   0 rgba(139, 195, 74, 0.7); }
      70%  { box-shadow: 0 0 0  12px rgba(139, 195, 74, 0); }
      100% { box-shadow: 0 0 0   0 rgba(139, 195, 74, 0); }
    }

    .info-box {
      flex: 1;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      color: #2d2d2d;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      display: none;
    }

    .info-box.active {
      display: block;
    }

    .info-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 15px;
      color: #689f38; /* Dark chartreuse */
    }

    .info-text {
      font-size: 15px;
      line-height: 1.7;
    }

    .note {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="model-container">
      <div class="overlay" onclick="hideHotspotsAndOverlay()"></div>

      <iframe
        title="Ashwagandha Plant 3D"
        src="https://sketchfab.com/models/c6876e8e2fc44ca8a56342d3cc67febf/embed?autostart=1"
        allow="autoplay; fullscreen; xr-spatial-tracking"
        xr-spatial-tracking
        execution-while-out-of-viewport
        execution-while-not-rendered
        web-share>
      </iframe>

      <!-- Hotspots -->
      <div class="hotspot" style="top: 30%; left: 50%;" onclick="showInfo('leaf')" title="Leaf"></div>
      <div class="hotspot" style="top: 55%; left: 45%;" onclick="showInfo('flower')" title="Flower"></div>
      <div class="hotspot" style="top: 80%; left: 50%;" onclick="showInfo('root')" title="Root"></div>
    </div>

    <!-- Info Box -->
    <div class="info-box" id="infoBox">
      <div class="info-title" id="infoTitle">Click a part</div>
      <div class="info-text" id="infoText">Click a green marker on the Ashwagandha plant to explore.</div>
      <div class="note">📌 Hotspots disappear after the first click so you can freely explore the model.</div>
    </div>
  </div>

  <script>
    const infoTitle = document.getElementById("infoTitle");
    const infoText = document.getElementById("infoText");
    const infoBox = document.getElementById("infoBox");

    const infoContent = {
      leaf: {
        title: "🍃 Ashwagandha Leaf",
        text: "Elliptic, dull green leaves are traditionally used in medicinal preparations and possess adaptogenic properties." 
      },
      flower: {
        title: "🌼 Ashwagandha Flower",
        text: "Small, green bell-shaped flowers appear in clusters and are part of the reproductive structure of the plant." 
      },
      root: {
        title: "🌱 Ashwagandha Root",
        text: "The principal medicinal part—rich in withanolides, renowned as an adaptogen and used for stress relief, vitality, and cognitive support." 
      }
    };

    function showInfo(part) {
      infoTitle.textContent = infoContent[part].title;
      infoText.textContent = infoContent[part].text;
      infoBox.classList.add("active");
    }

    function hideHotspotsAndOverlay() {
      document.querySelectorAll('.hotspot').forEach(dot => dot.style.display = 'none');
      document.querySelector('.overlay').style.display = 'none';
    }
  </script>

</body>
</html>
